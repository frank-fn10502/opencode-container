services:
  opencode:
    image: localhost/opencode-dev:local
    container_name: opencode-dev
    pull_policy: never
    working_dir: /workspace
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
    volumes:
      - ..:/workspace
      - ./config/opencode.json:/home/node/.config/opencode/opencode.json:ro
      - opencode-home:/home/node/.local/share/opencode
      - opencode-state:/home/node/.local/state

  opencode-cpp-runner:
    image: localhost/opencode-dev:local
    pull_policy: never
    working_dir: /workspace
    command: ["sleep", "infinity"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
    volumes:
      - ..:/workspace
      - ./config/opencode.json:/home/node/.config/opencode/opencode.json:ro
      - opencode-cpp-runner-home:/home/node/.local/share/opencode
      - opencode-cpp-runner-local-state:/home/node/.local/state

volumes:
  opencode-home:
    external: true
    name: opencode-home
  opencode-state:
    external: true
    name: opencode-state
  opencode-cpp-runner-home:
  opencode-cpp-runner-local-state:
