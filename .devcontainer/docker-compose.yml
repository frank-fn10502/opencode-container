services:
  opencode:
    image: ${OPENCODE_DEV_IMAGE:?Set OPENCODE_DEV_IMAGE to localhost/opencode-dev-yuta:<version>}
    container_name: opencode-dev-yuta
    pull_policy: never
    user: root
    entrypoint: ["/usr/local/bin/entrypoint-opencode.sh"]
    command: ["opencode"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      OPENCODE_ENABLE_EXA: "1"
    volumes:
      - ${OPENCODE_DEV_WORKSPACE:?Set OPENCODE_DEV_WORKSPACE to the host project path}:/workspace
      - ${OPENCODE_DEV_USER_CONFIG:?Set OPENCODE_DEV_USER_CONFIG to the user opencode-dev config path}:/opencode-dev/user:ro
      - ./config/opencode.json:/home/opencode/.config/opencode/opencode.json:ro
      - ./config/AGENTS.md:/home/opencode/.config/opencode/AGENTS.md:ro
      - ./config/command:/home/opencode/.config/opencode/command:ro
      - opencode-home-yuta:/home/opencode/.local/share/opencode
      - opencode-state-yuta:/home/opencode/.local/state

  opencode-vm:
    image: ${OPENCODE_DEV_IMAGE:?Set OPENCODE_DEV_IMAGE to localhost/opencode-dev-yuta:<version>}
    container_name: ${OPENCODE_VM_CONTAINER:-opencode-vm-yuta-default}
    hostname: ${OPENCODE_VM_HOSTNAME:-opencode-vm-default}
    pull_policy: never
    user: opencode
    entrypoint: ["/usr/local/bin/entrypoint-opencode.sh"]
    working_dir: /workspace
    command:
      - bash
      - -lc
      - |
        sudo mkdir -p /run/sshd
        sudo /usr/sbin/sshd
        opencode serve --hostname 0.0.0.0 --port 8001 --print-logs &
        wait
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      OPENCODE_ENABLE_EXA: "1"
      OPENCODE_INIT_WORKSPACE_OWNERSHIP: "1"
      HOME: /home/opencode
      USER: opencode
      LOGNAME: opencode
    ports:
      - "${OPENCODE_VM_WEBUI_PORT:-2501}:8001"
      - "${OPENCODE_VM_SSH_PORT:-2502}:22"
    volumes:
      - opencode-vm-workspace:/workspace
      - ${OPENCODE_DEV_USER_CONFIG:?Set OPENCODE_DEV_USER_CONFIG to the user opencode-dev config path}:/opencode-dev/user:ro
      - ./config/opencode.json:/home/opencode/.config/opencode/opencode.json:ro
      - ./config/AGENTS.md:/home/opencode/.config/opencode/AGENTS.md:ro
      - ./config/command:/home/opencode/.config/opencode/command:ro
      - opencode-vm-opencode-home:/home/opencode/.local/share/opencode
      - opencode-vm-state:/home/opencode/.local/state
      - opencode-vm-cache:/home/opencode/.cache
      - opencode-vm-ssh:/home/opencode/.ssh

volumes:
  opencode-home-yuta:
    name: opencode-home-yuta
  opencode-state-yuta:
    name: opencode-state-yuta
  opencode-vm-workspace:
    external: true
    name: ${OPENCODE_VM_WORKSPACE_VOLUME:-opencode-vm-yuta-workspace-default}
  opencode-vm-opencode-home:
    external: true
    name: ${OPENCODE_VM_OPENCODE_HOME_VOLUME:-opencode-vm-yuta-opencode-home-default}
  opencode-vm-state:
    external: true
    name: ${OPENCODE_VM_STATE_VOLUME:-opencode-vm-yuta-state-default}
  opencode-vm-cache:
    external: true
    name: ${OPENCODE_VM_CACHE_VOLUME:-opencode-vm-yuta-cache-default}
  opencode-vm-ssh:
    external: true
    name: ${OPENCODE_VM_SSH_VOLUME:-opencode-vm-yuta-ssh-default}
